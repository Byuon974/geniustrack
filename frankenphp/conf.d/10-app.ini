expose_php = 0
date.timezone = UTC
apc.enable_cli = 1
session.use_strict_mode = 1
zend.detect_unicode = 0

; Limites d'upload alignées sur la validation applicative des plans de projet.
; Sans cela, PHP applique ses défauts (2M par fichier, 8M par requête) et rejette
; les fichiers AVANT que Symfony ne valide, rendant les limites applicatives
; inatteignables. Repères : un STL très détaillé dépasse rarement 50 Mo (RETEX
; impression 3D). On autorise 25M par fichier, et une requête assez large pour
; plusieurs plans (10 fichiers, ~80M de contenu) plus la marge du reste du form.
upload_max_filesize = 25M
post_max_size = 90M
max_file_uploads = 12

; https://symfony.com/doc/current/performance.html
realpath_cache_size = 4096K
realpath_cache_ttl = 600
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 32531
opcache.memory_consumption = 256
opcache.enable_file_override = 1
